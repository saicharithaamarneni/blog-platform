<!DOCTYPE html>

<html>

<head>

<title>Register</title>

<link
rel="stylesheet"
href="{{url_for('static',filename='style.css')}}">

</head>

<body>

<div class="container">

<div class="card">

<h1>Create Account</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Register

</button>

</form>

<div class="links">

Already have account?

<a href="/login">

Login

</a>

</div>

</div>

</div>

</body>

</html>
